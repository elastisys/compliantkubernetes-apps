apiVersion: v1
kind: Service
metadata:
  name: {{ include "grafana-label-enforcer.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  ipFamilyPolicy: {{ .Values.service.ipFamilyPolicy }}
  ports:
  - name: promql
    port: 9090
    targetPort: promql
  selector:
    app: {{ include "grafana-label-enforcer.fullname" . }}
