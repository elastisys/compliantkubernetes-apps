---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
      app: "calico-accountant"
  name: "calico-accountant"
spec:
  endpoints:
  - port: metrics
    honorLabels: false
    metricRelabelings:
    - action: replace
      sourceLabels:
      - pod_namespace
      targetLabel: namespace
    relabelings:
    - action: replace
      sourceLabels:
      - __meta_kubernetes_namespace
      targetLabel: exporter_namespace
  selector:
    matchLabels:
      app: "calico-accountant"
---
apiVersion: v1
kind: Service
metadata:
  labels:
      app: "calico-accountant"
  name: calico-accountant-metrics
spec:
  ports:
  - port: 9009
    name: metrics
    protocol: TCP
    targetPort: 9009
  selector:
      app: "calico-accountant"
  sessionAffinity: None
  type: ClusterIP
